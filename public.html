<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Rate List">
    <title>PLAZA STEEL & CROCKERY | Rate List</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #f472b6;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DM Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244, 114, 182, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #020617 0%, #0f172a 50%, #020617 100%);
        }

        /* Animated Grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 15s ease-in-out infinite;
            z-index: -1;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: rgba(6, 182, 212, 0.35);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(244, 114, 182, 0.3);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }

        /* Main Container */
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Hero Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(var(--dark), var(--dark)) padding-box,
                        linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
            animation: ringSpin 10s linear infinite;
        }

        @keyframes ringSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.5) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.3; }
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            object-fit: cover;
            position: relative;
            z-index: 1;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .brand-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 20%, var(--primary-light) 50%, var(--secondary) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: titleShimmer 3s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .brand-tagline {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-tagline span {
            display: inline-block;
            animation: tagBounce 2s ease-in-out infinite;
        }

        .brand-tagline span:nth-child(2) { animation-delay: 0.2s; }
        .brand-tagline span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes tagBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Search Box */
        .search-wrapper {
            position: relative;
            margin: 25px 0 15px;
        }

        .search-box {
            width: 100%;
            padding: 18px 55px 18px 24px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--light);
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 
                0 0 40px rgba(99, 102, 241, 0.3),
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-light);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box:focus + .search-icon {
            color: var(--primary);
            transform: translateY(-50%) scale(1.2);
        }

        /* Results Header */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 8px;
        }

        .result-count {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        .total-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            animation: badgeGlow 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 4px 30px rgba(99, 102, 241, 0.6); }
        }

        /* Product List Container - Scrollable Box */
        .product-list-container {
            max-height: 45vh;
            overflow-y: auto;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            margin-bottom: 18px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .product-list-container::before {
            content: '';
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            z-index: 1;
        }

        .product-list-container::-webkit-scrollbar {
            width: 5px;
        }

        .product-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .product-list-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }

        /* Product List */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
        }

        /* Product Card */
        .product-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: cardSlideIn 0.5s ease backwards;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(99, 102, 241, 0.15);
        }

        .product-card:hover .product-name::before {
            color: var(--secondary);
            transform: scale(1.2) rotate(10deg);
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--light);
            margin-bottom: 14px;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .product-name::before {
            content: '◆';
            color: var(--primary);
            font-size: 0.65rem;
            margin-top: 4px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .price-wrapper {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .product-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .qty-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .qty-badge.low {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .qty-badge.out {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .product-card:hover .qty-badge {
            transform: scale(1.05);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .no-results i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: iconFloat 2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #20BD5A);
            color: white;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
        }

        .portal-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }

        .portal-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
        }

        .action-btn i {
            font-size: 1rem;
        }

        /* App Section */
        .app-section {
            margin-top: 18px;
            padding: 22px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(244, 114, 182, 0.05) 100%);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .app-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(99, 102, 241, 0.1), transparent);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .app-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .app-title i {
            color: var(--primary-light);
            animation: iconBounce 1s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .app-buttons {
            display: flex;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .app-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
        }

        .android-btn {
            background: linear-gradient(135deg, #3ddc84, #00a86b);
            color: white;
        }

        .ios-btn {
            background: linear-gradient(135deg, #1a1a1a, #333);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 25px 0;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.7rem;
            border-top: 1px solid var(--glass-border);
            margin-top: 18px;
        }

        .footer i {
            color: var(--primary-light);
            animation: heartPulse 1.5s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            color: var(--light);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast i {
            color: var(--primary-light);
        }

        /* Wave Animation for Loading */
        .wave-loader {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 40px;
        }

        .wave-loader span {
            width: 6px;
            background: var(--primary);
            border-radius: 3px;
            animation: wave 1.2s ease-in-out infinite;
        }

        .wave-loader span:nth-child(1) { height: 20px; animation-delay: 0s; }
        .wave-loader span:nth-child(2) { height: 30px; animation-delay: 0.1s; }
        .wave-loader span:nth-child(3) { height: 40px; animation-delay: 0.2s; }
        .wave-loader span:nth-child(4) { height: 30px; animation-delay: 0.3s; }
        .wave-loader span:nth-child(5) { height: 20px; animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 1.6rem;
            }
            
            .product-card {
                padding: 15px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .app-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-canvas"></div>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-glow"></div>
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo" onerror="this.style.display='none'">
            </div>
            <h1 class="brand-title">Plaza Steel & Crockery</h1>
            <p class="brand-tagline">
                <span>Premium</span> <span>Quality</span> <span>• Best Rates</span>
            </p>
        </header>

        <!-- Search -->
        <div class="search-wrapper">
            <input type="text" class="search-box" id="searchBox" placeholder="Search products...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- Results Info -->
        <div class="results-info">
            <span class="result-count" id="resultCount"></span>
            <span class="total-badge" id="totalBadge"></span>
        </div>

        <!-- Product List - Scrollable Container -->
        <div class="product-list-container" id="productListContainer">
            <div class="product-list" id="productList">
                <div class="loading">
                    <div class="wave-loader">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="https://wa.me/message/AEITVKONJBS3N1" class="action-btn whatsapp-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="portal.html" class="action-btn portal-btn">
                <i class="fas fa-store"></i> Portal
            </a>
        </div>

        <!-- App Download -->
        <div class="app-section">
            <h3 class="app-title">
                <i class="fas fa-mobile-alt"></i> Install Our App
            </h3>
            <div class="app-buttons">
                <a href="#" class="app-btn android-btn" onclick="installApp('android')">
                    <i class="fab fa-android"></i> Android
                </a>
                <a href="#" class="app-btn ios-btn" onclick="installApp('ios')">
                    <i class="fab fa-apple"></i> iOS
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p><i class="fas fa-heart"></i> Plaza Steel & Crockery</p>
            <p>Your Trusted Partner for Quality Products</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastText"></span>
    </div>

    <script>
        let allProducts = [];
        let deferredPrompt;

        async function loadProducts() {
            try {
                const response = await fetch('list/iteam list.json');
                const data = await response.json();

                allProducts = [];
                data.forEach(table => {
                    if (table['Sheet1'] && Array.isArray(table['Sheet1'])) {
                        table['Sheet1'].forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false
                                });
                            }
                        });
                    } else if (Array.isArray(table)) {
                        table.forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false
                                });
                            }
                        });
                    }
                });

                document.getElementById('totalBadge').innerHTML = `<i class="fas fa-box-open"></i> ${allProducts.length} Products`;
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productList').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading products</p>
                    </div>
                `;
            }
        }

        function displayProducts(products) {
            const productList = document.getElementById('productList');
            const resultCount = document.getElementById('resultCount');

            const activeProducts = products.filter(p => p.status !== false);

            if (activeProducts.length === 0) {
                productList.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>No products found</p>
                    </div>
                `;
                resultCount.innerHTML = '';
                return;
            }

            resultCount.innerHTML = `<i class="fas fa-check-circle"></i> Showing ${activeProducts.length} products`;

            productList.innerHTML = activeProducts.map((product, index) => {
                let qtyClass = '';
                if (product.qty <= 0) qtyClass = 'out';
                else if (product.qty <= 10) qtyClass = 'low';

                return `
                    <div class="product-card" style="animation-delay: ${index * 0.03}s">
                        <div class="product-name">${escapeHtml(product.description)}</div>
                        <div class="product-meta">
                            <div class="price-wrapper">
                                <span class="price-label">Sale Price</span>
                                <div class="product-price">Rs. ${formatNumber(product.price)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchProducts(query) {
            if (!query.trim()) {
                displayProducts(allProducts);
                return;
            }

            const searchTerms = query.toLowerCase().split(' ').filter(t => t.length > 0);
            const filtered = allProducts.filter(product => {
                const desc = product.description.toLowerCase();
                return searchTerms.every(term => desc.includes(term));
            });

            displayProducts(filtered);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function installApp(platform) {
            showToast(platform === 'android' 
                ? 'Android: Use "Add to Home Screen"' 
                : 'iOS: Use Safari Share > Add to Home Screen');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();

            const searchBox = document.getElementById('searchBox');
            let debounceTimer;

            searchBox.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchProducts(e.target.value);
                }, 300);
            });
        });
    </script>
</body>
</html>
