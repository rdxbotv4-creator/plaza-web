<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Rate List">
    <title>PLAZA STEEL & CROCKERY | Rate List</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f72585;
            --primary-dark: #b5179e;
            --secondary: #4cc9f0;
            --secondary-dark: #4895ef;
            --dark: #0d1b2a;
            --darker: #050a12;
            --light: #f8f9fa;
            --light-dim: rgba(255, 255, 255, 0.85);
            --accent: #7209b7;
            --accent-light: #9d4edd;
            --gold: #ffd700;
            --gold-light: #ffed4a;
            --success: #06d6a0;
            --warning: #ffb703;
            --danger: #ef233c;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --glow-pink: rgba(247, 37, 133, 0.5);
            --glow-cyan: rgba(76, 201, 240, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
        }

        /* Dynamic Color Background */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%);
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: blobFloat 20s ease-in-out infinite;
        }

        .glow-blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow-pink) 0%, transparent 70%);
            top: -150px;
            left: -100px;
            opacity: 0.4;
        }

        .glow-blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            opacity: 0.35;
            animation-delay: -7s;
        }

        .glow-blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            opacity: 0.25;
            animation-delay: -14s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(50px, -30px) rotate(90deg) scale(1.1); }
            50% { transform: translate(-30px, 30px) rotate(180deg) scale(0.95); }
            75% { transform: translate(20px, 10px) rotate(270deg) scale(1.05); }
        }

        /* Mesh Gradient */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            background-image: 
                radial-gradient(at 20% 80%, rgba(247, 37, 133, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 20%, rgba(76, 201, 240, 0.15) 0px, transparent 50%),
                radial-gradient(at 40% 40%, rgba(114, 9, 183, 0.1) 0px, transparent 50%);
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: sparkleFloat 8s ease-in-out infinite;
        }

        @keyframes sparkleFloat {
            0%, 100% { 
                transform: translateY(100vh) scale(0); 
                opacity: 0; 
            }
            10% { 
                transform: translateY(90vh) scale(1); 
                opacity: 1; 
            }
            90% { 
                transform: translateY(10vh) scale(1); 
                opacity: 0.8; 
            }
            100% { 
                transform: translateY(0) scale(0); 
                opacity: 0; 
            }
        }

        /* Main Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 25px;
            position: relative;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, var(--glow-pink) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.3; }
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(var(--darker), var(--darker)) padding-box,
                        linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(247, 37, 133, 0.3),
                inset 0 2px 10px rgba(255, 255, 255, 0.1);
            animation: logoFloat 4s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(1deg); }
            75% { transform: translateY(5px) rotate(-1deg); }
        }

        .brand-title {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, var(--secondary) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 10px rgba(247, 37, 133, 0.3));
        }

        .brand-tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Search Box */
        .search-wrapper {
            position: relative;
            margin: 25px 0;
        }

        .search-box {
            width: 100%;
            padding: 18px 55px 18px 22px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            color: var(--light);
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface-hover);
            box-shadow: 
                0 0 30px var(--glow-pink),
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
            animation: searchPulse 2.5s ease-in-out infinite;
        }

        @keyframes searchPulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.15); }
        }

        /* Results */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 5px;
        }

        .result-count {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        .total-badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 15px var(--glow-pink);
        }

        /* Product List */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 10px 0 20px;
        }

        .product-card {
            background: linear-gradient(135deg, var(--surface) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: cardIn 0.5s ease backwards;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateX(8px);
            background: var(--surface-hover);
            border-color: rgba(247, 37, 133, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--light);
            margin-bottom: 12px;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .product-name::before {
            content: '◈';
            color: var(--primary);
            font-size: 0.8rem;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price-wrapper {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .qty-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .qty-badge.low {
            background: rgba(255, 183, 3, 0.2);
            color: var(--warning);
        }

        .qty-badge.out {
            background: rgba(239, 35, 60, 0.2);
            color: var(--danger);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #20BD5A);
            color: white;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5);
        }

        .portal-btn {
            background: linear-gradient(135deg, var(--secondary-dark), var(--accent));
            color: white;
            box-shadow: 0 8px 25px rgba(76, 201, 240, 0.3);
        }

        .portal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(76, 201, 240, 0.5);
        }

        .action-btn i {
            font-size: 1.1rem;
        }

        /* App Download */
        .app-section {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, var(--surface) 0%, rgba(114, 9, 183, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .app-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .app-title i {
            color: var(--primary);
            animation: bounce 1s ease-in-out infinite;
        }

        .app-buttons {
            display: flex;
            gap: 12px;
        }

        .app-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .android-btn {
            background: linear-gradient(135deg, #3ddc84, #00a86b);
            color: white;
        }

        .ios-btn {
            background: linear-gradient(135deg, #333, #111);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .app-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        .footer i {
            color: var(--primary);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.25); }
            60% { transform: scale(1); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            color: var(--light);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--primary);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-canvas"></div>
    <div class="bg-glow">
        <div class="glow-blob glow-blob-1"></div>
        <div class="glow-blob glow-blob-2"></div>
        <div class="glow-blob glow-blob-3"></div>
    </div>
    <div class="mesh-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo" onerror="this.style.display='none'">
            </div>
            <h1 class="brand-title">Plaza Steel & Crockery</h1>
            <p class="brand-tagline">Premium Quality • Best Rates</p>
        </header>

        <!-- Search -->
        <div class="search-wrapper">
            <input type="text" class="search-box" id="searchBox" placeholder="Search products...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- Results Info -->
        <div class="results-info">
            <span class="result-count" id="resultCount"></span>
            <span class="total-badge" id="totalBadge"></span>
        </div>

        <!-- Product List -->
        <div class="product-list" id="productList">
            <div class="loading">
                <div class="loader"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="https://wa.me/message/AEITVKONJBS3N1" class="action-btn whatsapp-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="portal.html" class="action-btn portal-btn">
                <i class="fas fa-store"></i> Portal
            </a>
        </div>

        <!-- App Download -->
        <div class="app-section">
            <h3 class="app-title">
                <i class="fas fa-mobile-alt"></i> Install Our App
            </h3>
            <div class="app-buttons">
                <a href="#" class="app-btn android-btn" onclick="installApp('android')">
                    <i class="fab fa-android"></i> Android
                </a>
                <a href="#" class="app-btn ios-btn" onclick="installApp('ios')">
                    <i class="fab fa-apple"></i> iOS
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p><i class="fas fa-heart"></i> Plaza Steel & Crockery</p>
            <p>Your Trusted Partner for Quality Products</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let allProducts = [];
        let deferredPrompt;

        async function loadProducts() {
            try {
                const response = await fetch('list/iteam list.json');
                const data = await response.json();

                allProducts = [];
                data.forEach(table => {
                    if (table['Sheet1'] && Array.isArray(table['Sheet1'])) {
                        table['Sheet1'].forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false
                                });
                            }
                        });
                    } else if (Array.isArray(table)) {
                        table.forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false
                                });
                            }
                        });
                    }
                });

                document.getElementById('totalBadge').textContent = `${allProducts.length} Products`;
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productList').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading products</p>
                    </div>
                `;
            }
        }

        function displayProducts(products) {
            const productList = document.getElementById('productList');
            const resultCount = document.getElementById('resultCount');

            const activeProducts = products.filter(p => p.status !== false);

            if (activeProducts.length === 0) {
                productList.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>No products found</p>
                    </div>
                `;
                resultCount.textContent = '';
                return;
            }

            resultCount.textContent = `Showing ${activeProducts.length} products`;

            productList.innerHTML = activeProducts.map((product, index) => {
                let qtyClass = '';
                if (product.qty <= 0) qtyClass = 'out';
                else if (product.qty <= 10) qtyClass = 'low';

                return `
                    <div class="product-card" style="animation-delay: ${index * 0.03}s">
                        <div class="product-name">${escapeHtml(product.description)}</div>
                        <div class="product-meta">
                            <div class="price-wrapper">
                                <span class="price-label">Sale Price</span>
                                <div class="product-price">Rs. ${formatNumber(product.price)}</div>
                            </div>
                            <div class="qty-badge ${qtyClass}">Stock: ${product.qty}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchProducts(query) {
            if (!query.trim()) {
                displayProducts(allProducts);
                return;
            }

            const searchTerms = query.toLowerCase().split(' ').filter(t => t.length > 0);
            const filtered = allProducts.filter(product => {
                const desc = product.description.toLowerCase();
                return searchTerms.every(term => desc.includes(term));
            });

            displayProducts(filtered);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['var(--primary)', 'var(--secondary)', 'var(--gold)', 'var(--accent)'];
            
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 8 + 's';
                sparkle.style.animationDuration = (6 + Math.random() * 6) + 's';
                sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
                sparkle.style.boxShadow = `0 0 10px ${colors[Math.floor(Math.random() * colors.length)]}`;
                sparkle.style.width = (2 + Math.random() * 4) + 'px';
                sparkle.style.height = sparkle.style.width;
                container.appendChild(sparkle);
            }
        }

        function installApp(platform) {
            showToast(platform === 'android' 
                ? 'Android: Use "Add to Home Screen"' 
                : 'iOS: Use Safari Share > Add to Home Screen');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadProducts();

            const searchBox = document.getElementById('searchBox');
            let debounceTimer;

            searchBox.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchProducts(e.target.value);
                }, 300);
            });
        });
    </script>
</body>

</html>
