<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#87CEEB">
    <title>Admin Dashboard | Plaza Rate List</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(180deg, var(--sky-light) 0%, var(--sky-medium) 50%, var(--sky-deep) 100%);
        }

        .admin-page {
            min-height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 40px;
        }

        .admin-content {
            padding: 15px;
        }

        .admin-header-3d {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0, 131, 176, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-title-3d {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--sky-deep);
        }

        .admin-subtitle-3d {
            font-size: 0.7rem;
            color: var(--sky-deep);
            opacity: 0.7;
        }

        .logout-btn-3d {
            padding: 10px 18px;
            background: linear-gradient(180deg, #FF1744, #D50000);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.3);
        }

        .logout-btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 23, 68, 0.4);
        }

        .tab-nav-3d {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn-3d {
            flex: 1;
            padding: 14px;
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            color: var(--sky-deep);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 131, 176, 0.1);
        }

        .tab-btn-3d.active {
            background: linear-gradient(180deg, var(--sky-medium), var(--sky-deep));
            color: white;
            border-color: var(--sky-light);
            box-shadow: 0 6px 20px rgba(0, 131, 176, 0.3);
        }

        .tab-btn-3d:hover:not(.active) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 131, 176, 0.15);
        }

        .tab-content-3d {
            display: none;
        }

        .tab-content-3d.active {
            display: block;
        }

        .filter-btns-3d {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-btn-3d {
            padding: 8px 14px;
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            color: var(--sky-deep);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 2px 8px rgba(0, 131, 176, 0.1);
        }

        .filter-btn-3d.active {
            background: linear-gradient(180deg, var(--sky-medium), var(--sky-deep));
            color: white;
        }

        .filter-btn-3d:hover:not(.active) {
            transform: translateY(-2px);
        }

        .inventory-box-3d {
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border-radius: 16px;
            max-height: 40vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 10px 30px rgba(0, 131, 176, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .inventory-box-3d::-webkit-scrollbar {
            width: 5px;
        }

        .inventory-box-3d::-webkit-scrollbar-thumb {
            background: var(--sky-light);
            border-radius: 3px;
        }

        .inv-item-3d {
            padding: 15px;
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
            transition: all 0.3s ease;
        }

        .inv-item-3d:hover {
            background: rgba(135, 206, 235, 0.1);
            transform: translateX(5px);
        }

        .inv-item-3d:last-child {
            border-bottom: none;
        }

        .inv-header-3d {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .inv-name-3d {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--sky-deep);
            flex: 1;
            padding-right: 10px;
        }

        .status-badge-3d {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .status-badge-3d.online {
            background: linear-gradient(180deg, rgba(0, 230, 118, 0.2), rgba(0, 230, 118, 0.1));
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .status-badge-3d.offline {
            background: linear-gradient(180deg, rgba(255, 23, 68, 0.2), rgba(255, 23, 68, 0.1));
            color: #FF1744;
            border: 1px solid #FF1744;
        }

        .inv-fields-3d {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .inv-field-3d {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .inv-field-3d label {
            font-size: 0.6rem;
            color: var(--sky-deep);
            opacity: 0.7;
            text-transform: uppercase;
        }

        .inv-field-3d input {
            padding: 8px;
            background: linear-gradient(180deg, var(--white-ice), var(--white-cloud));
            border: 1px solid rgba(135, 206, 235, 0.3);
            border-radius: 8px;
            color: var(--sky-deep);
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .inv-field-3d input:focus {
            outline: none;
            border-color: var(--sky-medium);
            box-shadow: 0 0 0 2px rgba(0, 180, 219, 0.2);
        }

        .inv-actions-3d {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn-3d {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .save-btn-3d {
            background: linear-gradient(180deg, var(--accent-green), #00C853);
            color: white;
            box-shadow: 0 3px 10px rgba(0, 230, 118, 0.3);
        }

        .delete-btn-3d {
            background: linear-gradient(180deg, #FF1744, #D50000);
            color: white;
            box-shadow: 0 3px 10px rgba(255, 23, 68, 0.3);
        }

        .action-btn-3d:hover {
            transform: translateY(-2px);
        }

        .add-toggle-btn-3d {
            width: 100%;
            padding: 16px;
            background: linear-gradient(180deg, var(--sky-medium), var(--sky-deep));
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(0, 131, 176, 0.25);
        }

        .add-toggle-btn-3d:hover {
            border-color: var(--white-pure);
            box-shadow: 0 8px 25px rgba(0, 131, 176, 0.35);
        }

        .add-form-3d {
            display: none;
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border-radius: 16px;
            padding: 20px;
            margin-top: 12px;
            box-shadow: 0 10px 30px rgba(0, 131, 176, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .add-form-3d.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-row-3d {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-field-3d {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field-3d label {
            font-size: 0.75rem;
            color: var(--sky-deep);
            font-weight: 500;
        }

        .form-field-3d input {
            padding: 12px;
            background: linear-gradient(180deg, var(--white-ice), var(--white-cloud));
            border: 1px solid rgba(135, 206, 235, 0.3);
            border-radius: 10px;
            color: var(--sky-deep);
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .form-field-3d input:focus {
            outline: none;
            border-color: var(--sky-medium);
            box-shadow: 0 0 0 2px rgba(0, 180, 219, 0.2);
        }

        .status-toggle-3d {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .status-option-3d {
            flex: 1;
            padding: 12px;
            background: linear-gradient(180deg, var(--white-ice), var(--white-cloud));
            border: 1px solid rgba(135, 206, 235, 0.3);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--sky-deep);
        }

        .status-option-3d.active {
            border-color: var(--accent-green);
            background: linear-gradient(180deg, rgba(0, 230, 118, 0.2), rgba(0, 230, 118, 0.1));
            color: var(--accent-green);
        }

        .create-btn-3d {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, var(--sky-medium), var(--sky-deep));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 6px 20px rgba(0, 131, 176, 0.3);
        }

        .create-btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 131, 176, 0.4);
        }

        .report-card-3d {
            background: linear-gradient(180deg, var(--white-pure), var(--white-cloud));
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(0, 131, 176, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .report-header-3d {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .report-title-3d {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--sky-deep);
        }

        .report-count-3d {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .report-count-3d.negative { color: #FF1744; }
        .report-count-3d.low { color: var(--accent-orange); }
        .report-count-3d.active { color: var(--accent-green); }

        .report-list-3d {
            max-height: 150px;
            overflow-y: auto;
        }

        .report-item-3d {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(135, 206, 235, 0.1);
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.75rem;
            color: var(--sky-deep);
        }

        .report-item-qty-3d.negative { color: #FF1744; font-weight: 700; }
        .report-item-qty-3d.low { color: var(--accent-orange); font-weight: 700; }
        .report-item-qty-3d.active { color: var(--accent-green); font-weight: 700; }

        .download-pdf-btn-3d {
            width: 100%;
            padding: 16px;
            background: linear-gradient(180deg, var(--accent-green), #00C853);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.3);
        }

        .download-pdf-btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
        }
    </style>
</head>

<body class="admin-page">
    <div class="admin-content">
        <!-- 3D Header -->
        <div class="admin-header-3d">
            <div>
                <div class="admin-title-3d">Admin Dashboard</div>
                <div class="admin-subtitle-3d">Plaza Steel & Crockery</div>
            </div>
            <button class="logout-btn-3d" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- 3D Stats -->
        <div class="stats-grid-3d">
            <div class="stat-card-3d">
                <div class="stat-value-3d" id="totalItems" style="color: var(--sky-deep);">0</div>
                <div class="stat-label-3d">Total Items</div>
            </div>
            <div class="stat-card-3d">
                <div class="stat-value-3d" id="inStock" style="color: var(--accent-green);">0</div>
                <div class="stat-label-3d">In Stock</div>
            </div>
            <div class="stat-card-3d">
                <div class="stat-value-3d" id="outStock" style="color: #FF1744;">0</div>
                <div class="stat-label-3d">Out of Stock</div>
            </div>
        </div>

        <!-- 3D Tabs -->
        <div class="tab-nav-3d">
            <button class="tab-btn-3d active" onclick="showTab('inventory')">
                <i class="fas fa-box"></i> Inventory
            </button>
            <button class="tab-btn-3d" onclick="showTab('report')">
                <i class="fas fa-chart-bar"></i> Report
            </button>
        </div>

        <!-- Inventory Tab -->
        <div class="tab-content-3d active" id="inventoryTab">
            <input type="text" class="input-3d" id="invSearch" placeholder="Search inventory..." style="margin-bottom: 12px;">
            
            <div class="filter-btns-3d">
                <button class="filter-btn-3d active" onclick="filterItems('all', this)">All</button>
                <button class="filter-btn-3d" onclick="filterItems('online', this)">Online</button>
                <button class="filter-btn-3d" onclick="filterItems('offline', this)">Offline</button>
                <button class="filter-btn-3d" onclick="filterItems('low', this)">Low Stock</button>
                <button class="filter-btn-3d" onclick="filterItems('negative', this)">Negative</button>
            </div>

            <div class="inventory-box-3d" id="inventoryList">
                <div style="padding: 40px; text-align: center; color: var(--sky-deep); opacity: 0.7;">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>
            </div>

            <!-- Add New Item -->
            <button class="add-toggle-btn-3d" onclick="toggleAddForm()">
                <i class="fas fa-plus"></i> Add New Item
            </button>
            
            <div class="add-form-3d" id="addForm">
                <div class="form-row-3d">
                    <div class="form-field-3d">
                        <label>Item Description</label>
                        <input type="text" id="newDesc" placeholder="Enter name">
                    </div>
                    <div class="form-field-3d">
                        <label>Cost Price</label>
                        <input type="number" id="newCost" placeholder="0">
                    </div>
                </div>
                <div class="form-row-3d">
                    <div class="form-field-3d">
                        <label>Sale Price</label>
                        <input type="number" id="newPrice" placeholder="0">
                    </div>
                    <div class="form-field-3d">
                        <label>Quantity</label>
                        <input type="number" id="newQty" placeholder="0">
                    </div>
                </div>
                <div class="status-toggle-3d">
                    <div class="status-option-3d active" onclick="setNewStatus('online')" id="statusOnline">Online</div>
                    <div class="status-option-3d" onclick="setNewStatus('offline')" id="statusOffline">Offline</div>
                </div>
                <button class="create-btn-3d" onclick="createItem()">
                    <i class="fas fa-plus"></i> Create Item
                </button>
            </div>
        </div>

        <!-- Report Tab -->
        <div class="tab-content-3d" id="reportTab">
            <div class="report-card-3d">
                <div class="report-header-3d">
                    <span class="report-title-3d">Negative Stock</span>
                    <span class="report-count-3d negative" id="negativeCount">0</span>
                </div>
                <div class="report-list-3d" id="negativeList"></div>
            </div>

            <div class="report-card-3d">
                <div class="report-header-3d">
                    <span class="report-title-3d">Low Stock (1-9)</span>
                    <span class="report-count-3d low" id="lowCount">0</span>
                </div>
                <div class="report-list-3d" id="lowList"></div>
            </div>

            <div class="report-card-3d">
                <div class="report-header-3d">
                    <span class="report-title-3d">Active Stock (10+)</span>
                    <span class="report-count-3d active" id="activeCount">0</span>
                </div>
                <div class="report-list-3d" id="activeList"></div>
            </div>

            <button class="download-pdf-btn-3d" onclick="downloadPDF()">
                <i class="fas fa-file-pdf"></i> Download PDF Report
            </button>
        </div>
    </div>

    <!-- 3D Toast -->
    <div class="toast-3d" id="toast"></div>

    <script>
        let products = [];
        let currentFilter = 'all';
        let newItemStatus = 'online';

        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin-login.html';
        }

        function animateValue(id, start, end, duration) {
            const element = document.getElementById(id);
            const range = end - start;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const value = Math.floor(start + range * progress);
                element.textContent = value;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        async function loadProducts() {
            try {
                const response = await fetch('data/items.json');
                const data = await response.json();
                products = data;
                updateStats();
                renderInventory();
                renderReport();
            } catch (error) {
                console.error('Error:', error);
                showToast('Error loading products');
            }
        }

        function updateStats() {
            const total = products.length;
            const inStock = products.filter(p => p['Qty OH'] > 0).length;
            const outStock = products.filter(p => p['Qty OH'] <= 0).length;

            animateValue('totalItems', 0, total, 1000);
            animateValue('inStock', 0, inStock, 1000);
            animateValue('outStock', 0, outStock, 1000);
        }

        function renderInventory() {
            const searchTerm = document.getElementById('invSearch').value.toLowerCase();
            
            let filtered = products.filter(p => {
                const matchesSearch = p['Item Description'].toLowerCase().includes(searchTerm);
                
                switch (currentFilter) {
                    case 'online': return matchesSearch && p.Status === 'online';
                    case 'offline': return matchesSearch && p.Status === 'offline';
                    case 'low': return matchesSearch && p['Qty OH'] > 0 && p['Qty OH'] <= 9;
                    case 'negative': return matchesSearch && p['Qty OH'] < 0;
                    default: return matchesSearch;
                }
            });

            const list = document.getElementById('inventoryList');
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--sky-deep); opacity: 0.7;">No items found</div>';
                return;
            }

            list.innerHTML = filtered.map((item, index) => `
                <div class="inv-item-3d">
                    <div class="inv-header-3d">
                        <div class="inv-name-3d">${item['Item Description']}</div>
                        <div class="status-badge-3d ${item.Status}" onclick="toggleStatus(${index})">${item.Status}</div>
                    </div>
                    <div class="inv-fields-3d">
                        <div class="inv-field-3d">
                            <label>Cost</label>
                            <input type="number" value="${item.Cost}" onchange="updateField(${index}, 'Cost', this.value)">
                        </div>
                        <div class="inv-field-3d">
                            <label>Price</label>
                            <input type="number" value="${item.Price}" onchange="updateField(${index}, 'Price', this.value)">
                        </div>
                        <div class="inv-field-3d">
                            <label>Qty</label>
                            <input type="number" value="${item['Qty OH']}" onchange="updateField(${index}, 'Qty OH', this.value)">
                        </div>
                        <div class="inv-field-3d">
                            <label>ID</label>
                            <input type="text" value="${item.id}" disabled style="opacity: 0.5">
                        </div>
                    </div>
                    <div class="inv-actions-3d">
                        <button class="action-btn-3d save-btn-3d" onclick="saveItem(${index})">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <button class="action-btn-3d delete-btn-3d" onclick="deleteItem(${index})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleStatus(index) {
            products[index].Status = products[index].Status === 'online' ? 'offline' : 'online';
            saveToLocalStorage();
            renderInventory();
            updateStats();
            showToast(`Item ${products[index].Status === 'online' ? 'activated' : 'deactivated'}`);
        }

        function updateField(index, field, value) {
            products[index][field] = parseFloat(value) || 0;
        }

        function saveItem(index) {
            saveToLocalStorage();
            showToast('Item saved successfully');
        }

        function deleteItem(index) {
            if (confirm('Are you sure you want to delete this item?')) {
                products.splice(index, 1);
                saveToLocalStorage();
                renderInventory();
                updateStats();
                showToast('Item deleted');
            }
        }

        function filterItems(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn-3d').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderInventory();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-btn-3d').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content-3d').forEach(content => content.classList.remove('active'));
            
            if (tab === 'inventory') {
                document.querySelectorAll('.tab-btn-3d')[0].classList.add('active');
                document.getElementById('inventoryTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn-3d')[1].classList.add('active');
                document.getElementById('reportTab').classList.add('active');
                renderReport();
            }
        }

        function toggleAddForm() {
            document.getElementById('addForm').classList.toggle('show');
        }

        function setNewStatus(status) {
            newItemStatus = status;
            document.getElementById('statusOnline').classList.toggle('active', status === 'online');
            document.getElementById('statusOffline').classList.toggle('active', status === 'offline');
        }

        function createItem() {
            const desc = document.getElementById('newDesc').value;
            const cost = parseFloat(document.getElementById('newCost').value) || 0;
            const price = parseFloat(document.getElementById('newPrice').value) || 0;
            const qty = parseFloat(document.getElementById('newQty').value) || 0;

            if (!desc) {
                showToast('Please enter item description');
                return;
            }

            const newItem = {
                id: 'item-' + (products.length + 1),
                'Item Description': desc,
                Cost: cost,
                Price: price,
                'Qty OH': qty,
                Status: newItemStatus
            };

            products.push(newItem);
            saveToLocalStorage();
            
            document.getElementById('newDesc').value = '';
            document.getElementById('newCost').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newQty').value = '';
            
            renderInventory();
            updateStats();
            showToast('Item created successfully');
        }

        function renderReport() {
            const negative = products.filter(p => p['Qty OH'] < 0);
            const low = products.filter(p => p['Qty OH'] > 0 && p['Qty OH'] <= 9);
            const active = products.filter(p => p['Qty OH'] >= 10);

            document.getElementById('negativeCount').textContent = negative.length;
            document.getElementById('lowCount').textContent = low.length;
            document.getElementById('activeCount').textContent = active.length;

            document.getElementById('negativeList').innerHTML = negative.slice(0, 10).map(p => `
                <div class="report-item-3d">
                    <span>${p['Item Description'].substring(0, 25)}</span>
                    <span class="report-item-qty-3d negative">${p['Qty OH']}</span>
                </div>
            `).join('') + (negative.length > 10 ? `<div style="text-align:center;padding:8px;color:var(--sky-deep);opacity:0.7">+${negative.length - 10} more</div>` : '');

            document.getElementById('lowList').innerHTML = low.slice(0, 10).map(p => `
                <div class="report-item-3d">
                    <span>${p['Item Description'].substring(0, 25)}</span>
                    <span class="report-item-qty-3d low">${p['Qty OH']}</span>
                </div>
            `).join('') + (low.length > 10 ? `<div style="text-align:center;padding:8px;color:var(--sky-deep);opacity:0.7">+${low.length - 10} more</div>` : '');

            document.getElementById('activeList').innerHTML = active.slice(0, 10).map(p => `
                <div class="report-item-3d">
                    <span>${p['Item Description'].substring(0, 25)}</span>
                    <span class="report-item-qty-3d active">${p['Qty OH']}</span>
                </div>
            `).join('') + (active.length > 10 ? `<div style="text-align:center;padding:8px;color:var(--sky-deep);opacity:0.7">+${active.length - 10} more</div>` : '');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(20);
            doc.setTextColor(0, 131, 176);
            doc.text('PLAZA STEEL & CROCKERY', 105, 20, { align: 'center' });

            doc.setFontSize(14);
            doc.setTextColor(51, 51, 51);
            doc.text('Inventory Summary Report', 105, 30, { align: 'center' });
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 38, { align: 'center' });

            let y = 55;
            doc.setFontSize(12);
            doc.text(`Total Items: ${products.length}`, 20, y);
            doc.text(`In Stock: ${products.filter(p => p['Qty OH'] > 0).length}`, 20, y + 8);
            doc.text(`Out of Stock: ${products.filter(p => p['Qty OH'] <= 0).length}`, 20, y + 16);

            y = 85;
            doc.setFontSize(14);
            doc.setTextColor(255, 23, 68);
            doc.text('NEGATIVE STOCK', 20, y);
            
            const negative = products.filter(p => p['Qty OH'] < 0);
            y += 8;
            doc.setFontSize(9);
            doc.setTextColor(51, 51, 51);
            negative.slice(0, 10).forEach(p => {
                doc.text(`${p['Item Description'].substring(0, 35)} - Qty: ${p['Qty OH']}`, 20, y);
                y += 6;
            });

            y += 10;
            doc.setFontSize(14);
            doc.setTextColor(255, 152, 0);
            doc.text('LOW STOCK (1-9)', 20, y);
            
            const low = products.filter(p => p['Qty OH'] > 0 && p['Qty OH'] <= 9);
            y += 8;
            doc.setFontSize(9);
            doc.setTextColor(51, 51, 51);
            low.slice(0, 10).forEach(p => {
                doc.text(`${p['Item Description'].substring(0, 35)} - Qty: ${p['Qty OH']}`, 20, y);
                y += 6;
            });

            doc.save('Plaza_Inventory_Report.pdf');
            showToast('PDF downloaded');
        }

        function saveToLocalStorage() {
            localStorage.setItem('plazaProducts', JSON.stringify(products));
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }

        document.getElementById('invSearch').addEventListener('input', renderInventory);
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>

</html>
