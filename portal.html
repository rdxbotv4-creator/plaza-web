<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Portal">
    <title>Plaza Portal | Plaza Steel & Crockery</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e94560;
            --secondary: #0f3460;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #eaeaea;
            --accent: #00d9ff;
            --gold: #ffd700;
            --success: #00c853;
            --whatsapp: #25D366;
            --instagram: #E4405F;
            --glow: rgba(233, 69, 96, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--dark);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 215, 0, 0.05) 0%, transparent 30%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(100vh) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(-100vh) rotate(720deg); 
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--glow), inset 0 0 20px rgba(233, 69, 96, 0.3);
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { box-shadow: 0 0 20px var(--glow), inset 0 0 15px rgba(233, 69, 96, 0.3); }
            to { box-shadow: 0 0 40px var(--glow), inset 0 0 25px rgba(233, 69, 96, 0.5); }
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
            background-size: 200% auto;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Portal Options */
        .portal-section {
            margin-top: 30px;
        }

        .section-title {
            text-align: center;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contact Cards */
        .contact-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        .contact-card:nth-child(1) { animation-delay: 0.1s; }
        .contact-card:nth-child(2) { animation-delay: 0.2s; }
        .contact-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .contact-card:hover::before {
            left: 100%;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .contact-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .contact-card:hover .contact-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .whatsapp-icon {
            background: linear-gradient(135deg, #25D366, #20BD5A);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .instagram-icon {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            box-shadow: 0 4px 15px rgba(225, 48, 108, 0.4);
        }

        .admin-icon {
            background: linear-gradient(135deg, var(--secondary), var(--darker));
            color: white;
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.4);
        }

        .contact-info {
            flex: 1;
        }

        .contact-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--light);
            margin-bottom: 5px;
        }

        .contact-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .contact-arrow {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .contact-card:hover .contact-arrow {
            color: var(--light);
            transform: translateX(5px);
        }

        /* Glow effects on hover */
        .contact-card.whatsapp:hover {
            border-color: var(--whatsapp);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.3);
        }

        .contact-card.instagram:hover {
            border-color: var(--instagram);
            box-shadow: 0 15px 40px rgba(225, 48, 108, 0.3);
        }

        .contact-card.admin:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 40px var(--glow);
        }

        /* Back Button */
        .back-section {
            margin-top: 30px;
            text-align: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: var(--light);
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--glow);
        }

        .back-btn i {
            transition: all 0.3s ease;
        }

        .back-btn:hover i {
            transform: translateX(-5px);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }

        .footer i {
            color: var(--primary);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--darker);
            color: var(--light);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            border-left: 4px solid var(--success);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo" onerror="this.style.display='none'">
            </div>
            <h1 class="page-title">Plaza Portal</h1>
            <p class="tagline">Connect with Plaza Steel & Crockery</p>
        </header>

        <!-- Portal Options -->
        <div class="portal-section">
            <p class="section-title">Get in Touch</p>
            
            <!-- WhatsApp -->
            <a href="https://wa.me/message/AEITVKONJBS3N1" class="contact-card whatsapp" target="_blank">
                <div class="contact-icon whatsapp-icon">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">WhatsApp</div>
                    <div class="contact-desc">Contact us for inquiries</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/plaza.steel?igsh=MTVnbDI0d3o2M2hoYw%3D%3D&utm_source=qr" class="contact-card instagram" target="_blank">
                <div class="contact-icon instagram-icon">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">Instagram</div>
                    <div class="contact-desc">Follow us for updates</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <!-- Admin Portal -->
            <a href="admin.html" class="contact-card admin">
                <div class="contact-icon admin-icon">
                    <i class="fas fa-cogs"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">Admin Portal</div>
                    <div class="contact-desc">Manage inventory & reports</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>
        </div>

        <!-- Back Button -->
        <div class="back-section">
            <a href="public.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Rate List
            </a>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p><i class="fas fa-heart"></i> Plaza Steel & Crockery</p>
            <p>Your Trusted Partner for Quality Products</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });
    </script>
</body>
</html>
