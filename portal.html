<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Portal">
    <title>Plaza Portal | Plaza Steel & Crockery</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/premium.css">
    <style>
        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--light);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }

        .portal-container {
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: ringPulse 2s ease-in-out infinite;
        }

        .logo-ring:nth-child(2) {
            width: 150px;
            height: 150px;
            animation-delay: 0.5s;
            border-color: var(--accent);
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.1; }
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--glass-border);
            object-fit: cover;
            background: var(--glass);
            animation: logoFloat 3s ease-in-out infinite;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 40px var(--glow-primary);
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .portal-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .portal-title span {
            background: linear-gradient(90deg, #6366f1, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neonShimmer 3s linear infinite;
            background-size: 200% auto;
        }

        .portal-tagline {
            font-size: 0.95rem;
            color: var(--light-muted);
            margin-bottom: 35px;
            animation: fadeInUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .section-label {
            font-size: 0.8rem;
            color: var(--light-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease 0.4s forwards;
            opacity: 0;
        }

        .portal-buttons {
            animation: fadeInUp 0.8s ease 0.5s forwards;
            opacity: 0;
        }

        .portal-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            padding: 18px 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 14px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .portal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .portal-btn:hover::before {
            left: 100%;
        }

        .portal-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .portal-btn.whatsapp-btn:hover {
            background: linear-gradient(135deg, #25D366, #20BD5A);
            border-color: #25D366;
            color: white;
        }

        .portal-btn.instagram-btn:hover {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);
            border-color: #dc2743;
            color: white;
        }

        .portal-btn.admin-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            border-color: var(--primary);
            color: white;
        }

        .btn-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-icon.whatsapp {
            background: linear-gradient(135deg, #25D366, #20BD5A);
        }

        .btn-icon.instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .btn-icon.admin {
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
        }

        .btn-content {
            flex: 1;
        }

        .btn-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .btn-desc {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .btn-arrow {
            font-size: 1.2rem;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .portal-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 35px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease 0.6s forwards;
            opacity: 0;
        }

        .back-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .back-link i {
            transition: all 0.3s ease;
        }

        .back-link:hover i {
            transform: translateX(-5px);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            color: var(--light);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-primary);
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass-border);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .portal-container {
                padding: 20px 15px;
            }
            
            .portal-title {
                font-size: 1.8rem;
            }
            
            .portal-btn {
                padding: 15px 16px;
            }
            
            .btn-icon {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <div class="premium-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="particles-container" id="particles"></div>
    </div>

    <div class="portal-container">
        <div class="logo-wrapper">
            <div class="logo-ring"></div>
            <div class="logo-ring"></div>
            <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo-img" onerror="this.style.display='none'">
        </div>

        <h1 class="portal-title"><span>Plaza Portal</span></h1>
        <p class="portal-tagline">Connect with Plaza Steel & Crockery</p>

        <p class="section-label">Get in Touch</p>

        <div class="portal-buttons">
            <a href="https://wa.me/message/AEITVKONJBS3N1" class="portal-btn whatsapp-btn" target="_blank">
                <div class="btn-icon whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="btn-content">
                    <div class="btn-title">WhatsApp</div>
                    <div class="btn-desc">Chat with us</div>
                </div>
                <div class="btn-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <a href="https://www.instagram.com/plaza.steel" class="portal-btn instagram-btn" target="_blank">
                <div class="btn-icon instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="btn-content">
                    <div class="btn-title">Instagram</div>
                    <div class="btn-desc">Follow for updates</div>
                </div>
                <div class="btn-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <a href="admin-login.html" class="portal-btn admin-btn">
                <div class="btn-icon admin">
                    <i class="fas fa-cogs"></i>
                </div>
                <div class="btn-content">
                    <div class="btn-title">Admin Portal</div>
                    <div class="btn-desc">Manage inventory</div>
                </div>
                <div class="btn-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Rate List
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });
    </script>
</body>

</html>
