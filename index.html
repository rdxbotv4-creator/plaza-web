<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Rate List">
    <title>Plaza Rate List | Plaza Steel & Crockery</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/premium.css">
    <style>
        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--light);
            font-family: 'Outfit', sans-serif;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: ringPulse 2s ease-in-out infinite;
        }

        .logo-ring:nth-child(2) {
            width: 150px;
            height: 150px;
            animation-delay: 0.5s;
            border-color: var(--accent);
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.1; }
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--glass-border);
            object-fit: cover;
            background: var(--glass);
            animation: logoSpin 4s ease-in-out infinite, logoFloat 3s ease-in-out infinite;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 40px var(--glow-primary);
        }

        @keyframes logoSpin {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .brand-title .plaza {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-title .rate {
            background: linear-gradient(90deg, #06b6d4, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tagline {
            font-size: 0.95rem;
            color: var(--light-muted);
            animation: fadeInUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease 0.4s forwards;
            opacity: 0;
        }

        .search-input {
            width: 100%;
            padding: 18px 50px 18px 50px;
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            backdrop-filter: blur(10px);
            color: var(--light);
            font-size: 1rem;
            transition: all 0.4s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--glow-primary), 0 10px 30px rgba(0,0,0,0.3);
            transform: scale(1.01);
        }

        .search-input::placeholder {
            color: var(--light-muted);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
            animation: searchPulse 2s ease-in-out infinite;
        }

        @keyframes searchPulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
        }

        .search-clear {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--light-muted);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-clear:hover {
            color: var(--danger);
            transform: translateY(-50%) scale(1.2);
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            animation: fadeInUp 0.8s ease 0.5s forwards;
            opacity: 0;
        }

        .result-count {
            font-size: 0.85rem;
            color: var(--light-muted);
        }

        .total-badge {
            padding: 6px 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 15px var(--glow-primary);
        }

        .product-section {
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease 0.6s forwards;
            opacity: 0;
        }

        .product-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            max-height: 55vh;
            display: flex;
            flex-direction: column;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(90deg, rgba(99,102,241,0.1), rgba(168,85,247,0.1));
        }

        .product-header span {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-header i {
            color: var(--primary);
        }

        .product-count {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            padding: 4px 12px;
            background: rgba(168,85,247,0.15);
            border-radius: 12px;
        }

        .product-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            opacity: 0;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(99,102,241,0.4);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-item-num {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 600;
            padding: 3px 10px;
            background: rgba(99,102,241,0.15);
            border-radius: 8px;
        }

        .product-qty {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 8px;
        }

        .product-qty.in-stock {
            color: var(--success);
            background: rgba(16,185,129,0.15);
        }

        .product-qty.low-stock {
            color: var(--warning);
            background: rgba(245,158,11,0.15);
        }

        .product-qty.out-of-stock {
            color: var(--danger);
            background: rgba(239,68,68,0.15);
        }

        .product-description {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .product-prices {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-cost {
            font-size: 0.8rem;
            color: var(--light-muted);
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(16,185,129,0.3);
        }

        .search-highlight {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            padding: 0 4px;
            border-radius: 4px;
        }

        .no-products {
            text-align: center;
            padding: 40px 20px;
            color: var(--light-muted);
        }

        .no-products i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--primary);
            opacity: 0.5;
        }

        .no-products p {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .search-query {
            font-size: 0.85rem;
            color: var(--accent);
        }

        .action-buttons {
            animation: fadeInUp 0.8s ease 0.7s forwards;
            opacity: 0;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--light-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-align: center;
        }

        .download-section {
            margin-bottom: 20px;
        }

        .download-buttons {
            display: flex;
            gap: 12px;
        }

        .download-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn.android {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 8px 25px rgba(34,197,94,0.4);
        }

        .download-btn.ios {
            background: linear-gradient(135deg, #64748b, #475569);
            color: white;
            box-shadow: 0 8px 25px rgba(100,116,139,0.4);
        }

        .download-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .download-btn i {
            font-size: 1.2rem;
        }

        .download-btn .btn-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 14px;
            border: 2px solid white;
            opacity: 0;
            animation: btnPulse 2s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
        }

        .social-section {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .social-btn.whatsapp {
            background: linear-gradient(135deg, #25D366, #20BD5A);
            color: white;
            box-shadow: 0 8px 25px rgba(37,211,102,0.4);
        }

        .social-btn.instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            box-shadow: 0 8px 25px rgba(225,48,108,0.3);
        }

        .social-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .portal-section {
            margin-bottom: 20px;
        }

        .portal-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 8px 25px var(--glow-primary);
            position: relative;
            overflow: hidden;
        }

        .portal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .portal-btn:hover::before {
            left: 100%;
        }

        .portal-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px var(--glow-primary);
        }

        .portal-btn i {
            font-size: 1.2rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-primary);
            z-index: 1000;
            display: none;
            border: 1px solid var(--glass-border);
            animation: slideUp 0.5s ease;
        }

        .install-prompt.show {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .install-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .install-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--glow-primary);
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            color: var(--light);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-primary);
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass-border);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 15px;
            }
            
            .brand-title {
                font-size: 1.8rem;
            }
            
            .product-box {
                max-height: 50vh;
            }
        }
    </style>
</head>

<body>
    <div class="premium-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="particles-container" id="particles"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo-img" onerror="this.style.display='none'">
            </div>
            <h1 class="brand-title">
                <span class="plaza">PLAZA</span>
                <span class="rate">RATE</span>
            </h1>
            <p class="brand-tagline">Steel & Crockery • Best Rates</p>
        </header>

        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." autocomplete="off">
            <button class="search-clear" id="searchClear" style="display: none;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="results-info">
            <span class="result-count" id="resultCount"></span>
            <span class="total-badge" id="totalBadge"></span>
        </div>

        <section class="product-section">
            <div class="product-box">
                <div class="product-header">
                    <span><i class="fas fa-box-open"></i> Products</span>
                    <span class="product-count" id="productCount">0 items</span>
                </div>
                <div class="product-list" id="productList"></div>
            </div>
        </section>

        <div class="action-buttons">
            <div class="download-section">
                <p class="section-title">Install Our App</p>
                <div class="download-buttons">
                    <button class="download-btn android" onclick="triggerInstall('android')">
                        <i class="fab fa-android"></i> Android
                        <div class="btn-pulse"></div>
                    </button>
                    <button class="download-btn ios" onclick="triggerInstall('ios')">
                        <i class="fab fa-apple"></i> iOS
                        <div class="btn-pulse"></div>
                    </button>
                </div>
            </div>

            <div class="social-section">
                <a href="https://wa.me/message/AEITVKONJBS3N1" class="social-btn whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://www.instagram.com/plaza.steel" class="social-btn instagram" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>

            <div class="portal-section">
                <a href="portal.html" class="portal-btn">
                    <i class="fas fa-store"></i> Plaza Portal
                </a>
            </div>
        </div>
    </div>

    <div class="install-prompt" id="installPrompt">
        <button class="install-btn" onclick="promptInstall()">
            <i class="fas fa-download"></i> Install App
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allProducts = [];
        let searchQuery = '';

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        async function loadProducts() {
            try {
                localStorage.removeItem('plazaProducts');
                
                const response = await fetch('list/iteam list.json?t=' + Date.now());
                const text = await response.text();
                
                console.log('JSON response:', text);
                
                if (!text || text.trim() === '' || text.trim() === '{}') {
                    console.log('Empty JSON - showing error');
                    showProductError();
                    return;
                }
                
                const data = JSON.parse(text);

                allProducts = [];
                data.forEach(table => {
                    if (table['Sheet1'] && Array.isArray(table['Sheet1'])) {
                        table['Sheet1'].forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    itemNumber: item['Item #'] || item['Item No'] || '',
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false && item.status !== 'offline'
                                });
                            }
                        });
                    } else if (table['Table 1']) {
                        table['Table 1'].forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    itemNumber: item['Item #'] || item['Item No'] || '',
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false && item.status !== 'offline'
                                });
                            }
                        });
                    } else if (Array.isArray(table)) {
                        table.forEach(item => {
                            if (item['Item Description'] && item.Price !== undefined) {
                                allProducts.push({
                                    itemNumber: item['Item #'] || item['Item No'] || '',
                                    description: item['Item Description'],
                                    cost: item.Cost || 0,
                                    price: item.Price,
                                    qty: item['Qty OH'] || 0,
                                    status: item.status !== false && item.status !== 'offline'
                                });
                            }
                        });
                    }
                });

                if (allProducts.length === 0) {
                    localStorage.removeItem('plazaProducts');
                    showProductError();
                    return;
                }

                localStorage.setItem('plazaProducts', JSON.stringify(allProducts));

                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                showProductError();
            }
        }

        function displayProducts(products) {
            const productList = document.getElementById('productList');
            const productCount = document.getElementById('productCount');
            const resultCount = document.getElementById('resultCount');
            const totalBadge = document.getElementById('totalBadge');

            const activeProducts = products.filter(p => p.status !== false);
            productCount.textContent = `${activeProducts.length} items`;
            resultCount.textContent = `Showing ${activeProducts.length} products`;
            totalBadge.textContent = `${allProducts.length} total`;

            if (activeProducts.length === 0) {
                productList.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-sad-tear"></i>
                        <p>No products found</p>
                    </div>
                `;
                return;
            }

            let displayProducts = activeProducts;
            if (searchQuery.trim()) {
                const terms = searchQuery.toLowerCase().split(' ').filter(t => t.length > 0);
                displayProducts = activeProducts.filter(product => {
                    const desc = product.description.toLowerCase();
                    return terms.every(term => desc.includes(term));
                });
            }

            productCount.textContent = `${displayProducts.length} items`;
            resultCount.textContent = `Showing ${displayProducts.length} products`;

            if (displayProducts.length === 0) {
                productList.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-search"></i>
                        <p>No matching products</p>
                        <span class="search-query">"${searchQuery}"</span>
                    </div>
                `;
                return;
            }

            productList.innerHTML = displayProducts.map((product, index) => {
                let displayDesc = escapeHtml(product.description);
                if (searchQuery.trim()) {
                    const terms = searchQuery.toLowerCase().split(' ').filter(t => t.length > 0);
                    terms.forEach(term => {
                        const regex = new RegExp(`(${term})`, 'gi');
                        displayDesc = displayDesc.replace(regex, '<mark class="search-highlight">$1</mark>');
                    });
                }

                const itemNumHtml = product.itemNumber ? `<span class="product-item-num">#${product.itemNumber}</span>` : '';
                const qtyClass = product.qty <= 0 ? 'out-of-stock' : (product.qty <= 5 ? 'low-stock' : 'in-stock');
                const qtyDisplay = product.qty > 0 ? product.qty : '0';

                return `
                    <div class="product-card" style="animation-delay: ${index * 0.03}s">
                        <div class="product-card-header">
                            ${itemNumHtml}
                            <span class="product-qty ${qtyClass}">Stock: ${qtyDisplay}</span>
                        </div>
                        <div class="product-description">${displayDesc}</div>
                        <div class="product-prices">
                            <span class="product-cost">Cost: Rs. ${formatNumber(product.cost)}</span>
                            <span class="product-price">Rs. ${formatNumber(product.price)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleSearch(query) {
            searchQuery = query;
            const clearBtn = document.getElementById('searchClear');
            clearBtn.style.display = query.length > 0 ? 'flex' : 'none';
            displayProducts(allProducts);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').style.display = 'none';
            searchQuery = '';
            displayProducts(allProducts);
        }

        function showProductError() {
            document.getElementById('productList').innerHTML = `
                <div class="no-products error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Failed to load products</p>
                    <button onclick="loadProducts()" class="download-btn android" style="margin-top: 15px; width: auto; padding: 10px 20px;">
                        <i class="fas fa-redo"></i> Retry
                    </button>
                </div>
            `;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function triggerInstall(platform) {
            showToast(`Installing for ${platform}...`);
        }

        function promptInstall() {
            showToast('App installation coming soon!');
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            // Clear old service worker cache
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for (let registration of registrations) {
                        registration.unregister();
                    }
                });
            }
            
            loadProducts();

            const searchInput = document.getElementById('searchInput');
            let debounceTimer;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    handleSearch(e.target.value);
                }, 200);
            });

            document.getElementById('searchClear').addEventListener('click', clearSearch);

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    clearSearch();
                    searchInput.blur();
                }
            });
        });
    </script>
</body>

</html>
