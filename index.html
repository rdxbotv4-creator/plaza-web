<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plaza Rate List">
    <title>Plaza Rate List | Plaza Steel & Crockery</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="public-page-3d">
    <!-- 3D Sky Background -->
    <div class="sky-background">
        <div class="sky-gradient"></div>
    </div>

    <!-- 3D Clouds -->
    <div class="clouds-container">
        <div class="cloud cloud-1 cloud-entrance"></div>
        <div class="cloud cloud-2 cloud-entrance"></div>
        <div class="cloud cloud-3 cloud-entrance"></div>
        <div class="cloud cloud-4 cloud-entrance"></div>
        <div class="cloud cloud-5 cloud-entrance"></div>
    </div>

    <!-- 3D Sun -->
    <div class="sun-container">
        <div class="sun-glow"></div>
        <div class="sun"></div>
        <div class="sun-rays">
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
            <div class="sun-ray"></div>
        </div>
    </div>

    <!-- 3D Bubbles -->
    <div class="bubbles-container" id="bubbles"></div>

    <!-- 3D Sparkles -->
    <div class="sparkles-container" id="sparkles"></div>

    <div class="content-wrapper">
        <!-- 3D Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-3d-glow"></div>
                <div class="logo-ripple"></div>
                <div class="logo-ripple"></div>
                <div class="logo-ripple"></div>
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo-3d" onerror="this.style.display='none'">
            </div>
            <h1 class="brand-title-3d" id="brandTitle">
                <span>P</span><span>L</span><span>A</span><span>Z</span><span>A</span>
                <span>R</span><span>A</span><span>T</span><span>E</span>
            </h1>
            <p class="brand-tagline-3d">Steel & Crockery • Best Rates</p>
        </header>

        <!-- 3D Search -->
        <div class="search-container-3d">
            <input type="text" class="search-box-3d" id="searchBox" placeholder="Search products...">
            <div class="search-glow-3d"></div>
            <i class="fas fa-search search-icon-3d"></i>
        </div>

        <!-- 3D Results Info -->
        <div class="results-info-3d">
            <span class="result-count-3d" id="resultCount"></span>
            <span class="total-badge-3d" id="totalBadge"></span>
        </div>

        <!-- 3D Product Box -->
        <div class="product-box-3d" id="productBox">
            <div class="loading-3d" id="loading">
                <div class="loader-3d"></div>
            </div>
            <div class="product-list-3d" id="productList"></div>
        </div>

        <!-- 3D Bottom Content -->
        <div class="bottom-content-3d">
            <!-- Download Buttons -->
            <div class="download-section-3d">
                <h3 class="section-title-3d">Install Our App</h3>
                <div class="download-buttons-3d">
                    <button class="btn-3d android-btn-3d pulse-btn-3d" onclick="installApp('android')">
                        <i class="fab fa-android"></i> Android
                    </button>
                    <button class="btn-3d ios-btn-3d pulse-btn-3d" onclick="installApp('ios')">
                        <i class="fab fa-apple"></i> iOS
                    </button>
                </div>
            </div>

            <!-- Social Links -->
            <div class="social-section-3d">
                <a href="https://wa.me/message/AEITVKONJBS3N1" class="social-btn-3d whatsapp-btn-3d" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://www.instagram.com/plaza.steel" class="social-btn-3d instagram-btn-3d" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>

            <!-- Portal Button -->
            <a href="portal.html" class="portal-link-3d">
                <i class="fas fa-store"></i> Plaza Portal
            </a>
        </div>
    </div>

    <!-- 3D Toast -->
    <div class="toast-3d" id="toast"></div>

    <!-- 3D Install Prompt -->
    <div class="install-prompt-3d" id="installPrompt">
        <button class="install-btn-3d" onclick="promptInstall()">
            <i class="fas fa-download"></i> Install App
        </button>
    </div>

    <!-- 3D Confetti Container -->
    <div class="confetti-container-3d" id="confettiContainer"></div>

    <script src="assets/js/search.js"></script>
    <script src="assets/js/pwa.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // 3D Particle Systems
        document.addEventListener('DOMContentLoaded', function() {
            createBubbles();
            createSparkles();
            setup3DTilt();
        });

        // Create floating bubbles
        function createBubbles() {
            const container = document.getElementById('bubbles');
            const bubbleCount = 20;

            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 20 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 10 + 10) + 's';
                bubble.style.animationDelay = (Math.random() * 10) + 's';
                bubble.style.opacity = Math.random() * 0.4 + 0.2;

                bubble.addEventListener('click', function() {
                    this.classList.add('pop');
                    setTimeout(() => {
                        this.remove();
                        createSingleBubble(container);
                    }, 300);
                });

                container.appendChild(bubble);
            }
        }

        // Create single bubble to replace popped one
        function createSingleBubble(container) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            const size = Math.random() * 20 + 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = (Math.random() * 10 + 10) + 's';
            bubble.style.opacity = Math.random() * 0.4 + 0.2;

            bubble.addEventListener('click', function() {
                this.classList.add('pop');
                setTimeout(() => {
                    this.remove();
                    createSingleBubble(container);
                }, 300);
            });

            container.appendChild(bubble);
        }

        // Create sparkles
        function createSparkles() {
            const container = document.getElementById('sparkles');
            const sparkleCount = 50;

            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = Math.random() > 0.5 ? 'sparkle twinkle' : 'sparkle';
                
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                sparkle.style.animationDelay = (Math.random() * 10) + 's';
                sparkle.style.width = (Math.random() * 3 + 2) + 'px';
                sparkle.style.height = sparkle.style.width;

                container.appendChild(sparkle);
            }
        }

        // 3D Tilt Effect on Device Orientation
        function setup3DTilt() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', function(event) {
                    const tiltX = event.gamma || 0;
                    const tiltY = event.beta || 0;

                    document.querySelectorAll('.product-card-3d').forEach(card => {
                        const rotateX = Math.min(Math.max(tiltY / 10, -5), 5);
                        const rotateY = Math.min(Math.max(tiltX / 10, -5), 5);
                        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                    });
                });
            }
        }
    </script>
</body>

</html>
