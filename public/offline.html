<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a2a6c">
    <title>Offline | Plaza Rate List</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --dark: #0a0f2a;
            --light: #ffffff;
            --accent-gold: #FFD700;
            --glass-white: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background */
        .offline-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a2a6c 50%, #2d1b4e 100%);
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #b21f1f, #fdbb2d);
            top: -100px;
            left: -100px;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #1a2a6c, #00d9ff);
            bottom: -50px;
            right: -50px;
            animation: orbFloat 20s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(50px, -30px) scale(1.1);
            }

            50% {
                transform: translate(-30px, 50px) scale(0.9);
            }

            75% {
                transform: translate(-50px, -20px) scale(1.05);
            }
        }

        .offline-container {
            max-width: 400px;
            padding: 30px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .offline-icon i {
            font-size: 3rem;
            color: var(--accent-gold);
        }

        .offline-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--accent-gold), #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .offline-message {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 50px;
            color: var(--light);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(26, 42, 108, 0.5);
        }

        .retry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        .retry-btn i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .cached-data-notice {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .cached-data-notice p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .cached-data-notice i {
            color: var(--accent-gold);
            margin-right: 8px;
        }

        /* Logo in offline page */
        .logo-small {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.1);
        }

        .logo-small i {
            font-size: 1.5rem;
            color: var(--accent-gold);
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="offline-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
    </div>

    <div class="offline-container">
        <div class="logo-small">
            <i class="fas fa-store"></i>
        </div>

        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>

        <h1 class="offline-title">You're Offline</h1>

        <p class="offline-message">
            Oops! It looks like you've lost your internet connection.
            Don't worry - some of your data may still be available from the cache.
        </p>

        <button class="retry-btn" onclick="retryConnection()">
            <i class="fas fa-redo"></i>
            Try Again
        </button>

        <div class="cached-data-notice">
            <p><i class="fas fa-info-circle"></i> Previously viewed content may still be available</p>
        </div>
    </div>

    <script>
        function retryConnection() {
            const btn = document.querySelector('.retry-btn');
            btn.innerHTML = '<i class="fas fa-spinner"></i> Checking...';

            // Check if we're back online
            if (navigator.onLine) {
                // Reload the page
                window.location.reload();
            } else {
                // Show retry option again after a delay
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-redo"></i> Try Again';
                    showToast('Still offline. Please check your connection.');
                }, 2000);
            }
        }

        // Listen for online event
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Show toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                padding: 15px 25px;
                border-radius: 50px;
                color: white;
                font-size: 0.9rem;
                border: 1px solid rgba(255, 215, 0, 0.3);
                z-index: 1000;
                animation: fadeInUp 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>

</html>
