<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin Login">
    <title>Admin Login | Plaza Portal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/premium.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent-2: #a855f7;
            --gold: #fbbf24;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --light-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glow-primary: rgba(99, 102, 241, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }

        .login-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px);
            padding: 45px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.6s ease, slideUp 0.6s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(99, 102, 241, 0.1);
            position: relative;
            overflow: hidden;
            margin: 20px;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent-2), var(--gold));
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.4;
            animation: ringPulse 2s ease-in-out infinite;
        }

        .logo-ring:nth-child(2) {
            width: 140px;
            height: 140px;
            animation-delay: 0.5s;
            border-color: var(--accent);
            opacity: 0.2;
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.15; }
        }

        .login-logo img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            animation: logoSpin 8s linear infinite;
            box-shadow: 0 0 30px var(--glow-primary), 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-logo img:hover {
            animation-play-state: paused;
        }

        .login-title {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent-2), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neonShimmer 3s linear infinite;
            background-size: 200% auto;
        }

        @keyframes neonShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--glass-border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: var(--light);
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--glow-primary), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px var(--glow-primary);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px var(--glow-primary);
        }

        .login-btn i {
            margin-right: 8px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .login-error {
            color: var(--danger);
            text-align: center;
            margin-top: 18px;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.5s ease-in-out;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 25px;
            margin-top: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .back-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
            color: var(--primary);
        }

        .back-link i {
            transition: all 0.3s ease;
        }

        .back-link:hover i {
            transform: translateX(-5px);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--dark), var(--darker));
            color: var(--light);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-primary);
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass-border);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="premium-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="particles-container" id="particles"></div>
    </div>

    <div class="login-container">
        <div class="login-logo">
            <div class="logo-ring"></div>
            <div class="logo-ring"></div>
            <img src="../cache/logo.png" alt="Plaza Steel & Crockery" onerror="this.style.display='none'">
        </div>
        <h2 class="login-title">Admin Portal</h2>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <p class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password
            </p>
        </form>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Rate List
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        const CORRECT_USERNAME = 'adminplaza';
        const CORRECT_PASSWORD = '34402';

        const isLoggedIn = sessionStorage.getItem('plazaAdminLoggedIn');
        if (isLoggedIn === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginError = document.getElementById('loginError');

            if (username === CORRECT_USERNAME && password === CORRECT_PASSWORD) {
                sessionStorage.setItem('plazaAdminLoggedIn', 'true');
                sessionStorage.setItem('plazaAdminLoginTime', Date.now());

                document.querySelector('.login-btn').innerHTML = '<i class="fas fa-check"></i> Success!';
                document.querySelector('.login-btn').style.background = 'linear-gradient(135deg, #10b981, #059669)';

                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 500);
            } else {
                loginError.classList.add('show');
                document.querySelector('.login-container').style.animation = 'none';
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = 'shake 0.5s ease-in-out';
                }, 10);
            }
        });

        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('loginError').classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('loginError').classList.remove('show');
        });

        function checkSession() {
            const loginTime = sessionStorage.getItem('plazaAdminLoginTime');
            if (loginTime) {
                const elapsed = Date.now() - parseInt(loginTime);
                const thirtyMinutes = 30 * 60 * 1000;

                if (elapsed > thirtyMinutes) {
                    sessionStorage.removeItem('plazaAdminLoggedIn');
                    sessionStorage.removeItem('plazaAdminLoginTime');
                    showToast('Session expired. Please login again.');
                }
            }
        }

        setInterval(checkSession, 60000);

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });
    </script>
</body>

</html>
